<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DCO LABB</title>

  <meta name="theme-color" content="#0b0b0f" />
  <meta name="description" content="Panel inteligente de DCO LABB" />
  <link rel="manifest" href="manifest.json" />

  <style>
    :root {
      --bg: #0b0b0f;
      --card: #15161b;
      --card-2: #1b1d23;
      --text: #f4f1ea;
      --muted: #9a9aa3;
      --gold: #c7a86b;
      --line: rgba(255,255,255,0.06);
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(199,168,107,0.08), transparent 28%),
        linear-gradient(180deg, #0a0a0d 0%, #0b0b0f 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 18px 16px 28px;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .brand-mini {
      font-size: 14px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .badge {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--gold);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .hero {
      padding: 18px 6px 8px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .logo .gold {
      color: var(--gold);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 26px 4px 14px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .screen-title {
      margin: 8px 4px 18px;
      font-size: 22px;
      font-weight: 700;
    }

    .screen-subtitle {
      margin: -6px 4px 18px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
    }

    .card {
      width: 100%;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.985);
    }

    .icon-wrap {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
    }

    .gold-box { background: rgba(199,168,107,0.08); }
    .pink-box { background: rgba(180,90,130,0.10); }
    .green-box { background: rgba(70,140,110,0.12); }
    .purple-box { background: rgba(120,90,180,0.12); }
    .blue-box { background: rgba(70,110,180,0.12); }

    .card-text { flex: 1; }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
    }

    .arrow {
      color: var(--gold);
      font-size: 22px;
    }

    .back-btn {
      width: 100%;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: white;
      font-weight: bold;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: #6f7078;
      font-size: 12px;
    }
  </style>
</head>

<body>
<div class="app">

  <!-- HOME -->
  <div id="homeScreen">
    <div class="topbar">
      <div class="brand-mini">DCO LABB</div>
      <div class="badge">AGENTE IA</div>
    </div>

    <div class="hero">
      <h1 class="logo">DCO <span class="gold">LABB</span></h1>
      <div class="subtitle">Selecciona tu perfil</div>
    </div>

    <div class="section-title">Accesos rápidos</div>

    <div class="card" onclick="showScreen('presupuestosScreen')">
      <div class="icon-wrap gold-box">📋</div>
      <div class="card-text">
        <div class="card-title">Presupuestos</div>
        <div class="card-desc">Genera presupuestos profesionales</div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div class="card" onclick="openGPT('Necesito responder un DM profesional')">
      <div class="icon-wrap pink-box">📱</div>
      <div class="card-text">
        <div class="card-title">DMs Instagram</div>
        <div class="card-desc">Respuestas rápidas</div>
      </div>
    </div>

  </div>

  <!-- PRESUPUESTOS -->
  <div id="presupuestosScreen" class="hidden">
    <button class="back-btn" onclick="showScreen('homeScreen')">← Volver</button>

    <div class="screen-title">Tipo de presupuesto</div>

    <div class="card" onclick="showScreen('mueblesScreen')">
      <div class="card-title">Muebles a medida</div>
    </div>

    <div class="card" onclick="openGPT('Presupuesto cuadro epoxi')">
      <div class="card-title">Cuadros epoxi</div>
    </div>

    <div class="card" onclick="openGPT('Presupuesto carpintería')">
      <div class="card-title">Carpintería</div>
    </div>
  </div>

  <!-- MUEBLES -->
  <div id="mueblesScreen" class="hidden">
    <button class="back-btn" onclick="showScreen('presupuestosScreen')">← Volver</button>

    <div class="screen-title">Tipo de mesa</div>

    <div class="card" onclick="openGPT('Presupuesto mesa comedor madera epoxi')">
      <div class="card-title">Mesa comedor</div>
    </div>

    <div class="card" onclick="openGPT('Presupuesto mesa centro')">
      <div class="card-title">Mesa centro</div>
    </div>

    <div class="card" onclick="openGPT('Presupuesto mesita noche')">
      <div class="card-title">Mesita noche</div>
    </div>
  </div>

</div>

<script>
function showScreen(id){
  document.querySelectorAll('[id$="Screen"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function openGPT(texto){
  const url = "https://chatgpt.com/?q=" + encodeURIComponent(texto);
  window.location.href = url;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
  });
}
</script>

</body>
</html>
